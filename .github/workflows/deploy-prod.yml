name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never cancel an in-flight production deploy

jobs:
  # ── 1. Run migrations BEFORE deploying ──────────────────────────────────────
  migrate:
    name: Database Migration
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @casino/database
        run: pnpm --filter @casino/database build

      - name: Run migrations
        run: pnpm --filter @casino/database db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── 2. Deploy frontend (Vercel) ─────────────────────────────────────────────
  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    needs: migrate
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-prod-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**') }}
          restore-keys: nextjs-prod-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @casino/database
        run: pnpm --filter @casino/database build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 3. Deploy backend (Railway) ─────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    needs: migrate
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          railway up \
            --service=${{ secrets.RAILWAY_SERVICE_NAME }} \
            --environment=production \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment health
        run: |
          echo "Waiting 60s for Railway deployment to stabilize..."
          sleep 60
          curl --fail --retry 5 --retry-delay 10 \
            "${{ secrets.API_PROD_URL }}/health" \
            -H "Accept: application/json" \
            | jq .
